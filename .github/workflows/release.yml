name: Release Charts

on:
  push:
    branches:
      - main
      - beta
      - alpha
      # - feature/*
      # - fix/*

jobs:
  release:
    name: Semantic Release
    # depending on default permission settings for your org (contents being read-only or read-write for workloads), you will have to add permissions
    # see: https://docs.github.com/en/actions/security-guides/automatic-token-authentication#modifying-the-permissions-for-the-github_token
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # https://github.com/marketplace/actions/changed-files
      - name: Get changed charts
        id: helm-changed-charts
        uses: tj-actions/changed-files@v35
        with:
          dir_names: true
          files: |
            charts/**/*.yaml
            charts/**/*.yml
            charts/**/NOTES.txt

      - name: Display changed charts
        if: steps.helm-changed-charts.outputs.any_changed == 'true'
        run: echo ${{ steps.helm-changed-charts.outputs.all_changed_files }}

      - name: Configure Git
        if: steps.helm-changed-charts.outputs.any_changed == 'true'
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        if: steps.helm-changed-charts.outputs.any_changed == 'true'
        uses: azure/setup-helm@v3.5

      - name: Add saritasa repository dependency
        if: steps.helm-changed-charts.outputs.any_changed == 'true'
        run: |
          helm repo add saritasa https://saritasa-nest.github.io/saritasa-devops-helm-charts/
          helm repo update

      - name: Semantic Release
        id: semantic-release
        if: steps.helm-changed-charts.outputs.any_changed == 'true'
        uses: cycjimmy/semantic-release-action@v3.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          semantic_version: 19.0.5
          working_directory: charts/tekton-apps
          extra_plugins: |
            conventional-changelog-angular@5.0.13
            semantic-release-helm3@2.3.4

      - name: Do something when a new release published
        if: |
          steps.semantic-release.outputs.new_release_published == 'true' &&
          steps.helm-changed-charts.outputs.any_changed == 'true'
        run: |
          echo ${{ steps.semantic-release.outputs.new_release_version }}
          echo ${{ steps.semantic-release.outputs.new_release_major_version }}
          echo ${{ steps.semantic-release.outputs.new_release_minor_version }}
          echo ${{ steps.semantic-release.outputs.new_release_patch_version }}

      - name: Run chart-releaser
        if: steps.helm-changed-charts.outputs.any_changed == 'true'
        uses: helm/chart-releaser-action@v1.5.0
        with:
          config: cr.yaml
          charts_dir: charts
          # uncomment when this PR is merged
          # https://github.com/helm/chart-releaser-action/pull/134/
          # skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
